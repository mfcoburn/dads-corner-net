# Deploy Dad's Corner to GitHub Pages
#
# Triggered on every push to `main`.
# The site is pure HTML/CSS/JS – no build step required.
# After the workflow runs, the site is live at:
#   https://<owner>.github.io/<repo>/
# or at the custom domain set in the CNAME file (dadscorner.net).
#
# One-time setup in your repository:
#   Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow running manually from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site files as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload everything from the repo root (no build step needed)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
